<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sapinho & Sapinha 🐸 Nosso AP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a4a2e 0%, #2d6a4f 30%, #40916c 60%, #52b788 100%);
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }

    /* Efeito de água animado */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(116, 198, 157, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(46, 125, 89, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(149, 213, 178, 0.2) 0%, transparent 60%);
      animation: waterFlow 15s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes waterFlow {
      0% { opacity: 0.5; transform: scale(1) translate(0, 0); }
      50% { opacity: 0.8; transform: scale(1.05) translate(-20px, -10px); }
      100% { opacity: 0.6; transform: scale(1.1) translate(10px, 20px); }
    }

    /* Folhas flutuantes */
    .floating-leaf {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      animation: floatLeaf 20s ease-in-out infinite;
      opacity: 0.15;
    }

    @keyframes floatLeaf {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* Card principal com efeito de vitral */
    .lilypad-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 2px solid rgba(82, 183, 136, 0.3);
      border-radius: 40px;
      padding: 30px 25px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.25),
        inset 0 2px 4px rgba(255, 255, 255, 0.1),
        0 0 0 1px rgba(82, 183, 136, 0.2);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      animation: cardGlow 4s ease-in-out infinite alternate;
    }

    @keyframes cardGlow {
      0% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.1), 0 0 20px rgba(82, 183, 136, 0.2); }
      100% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.1), 0 0 40px rgba(82, 183, 136, 0.4); }
    }

    /* Título com fonte cursiva */
    .fancy-title {
      font-family: 'Dancing Script', cursive;
      font-size: 3.2rem;
      font-weight: 700;
      text-align: center;
      color: #d8f3dc;
      text-shadow: 
        0 4px 8px rgba(0, 0, 0, 0.2),
        0 0 20px rgba(116, 198, 157, 0.5),
        0 0 40px rgba(64, 145, 108, 0.3);
      margin-bottom: 10px;
      animation: titleShine 3s ease-in-out infinite;
      letter-spacing: 2px;
    }

    @keyframes titleShine {
      0%, 100% { text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2), 0 0 20px rgba(116, 198, 157, 0.5), 0 0 40px rgba(64, 145, 108, 0.3); }
      50% { text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2), 0 0 30px rgba(149, 213, 178, 0.7), 0 0 60px rgba(82, 183, 136, 0.5); }
    }

    /* Sapinhos animados */
    .frog-couple {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
    }

    .frog {
      font-size: 3.5rem;
      animation: frogBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
      transition: transform 0.3s;
      cursor: pointer;
    }

    .frog:hover {
      transform: scale(1.1);
      animation: frogHappy 0.6s ease-in-out;
    }

    .frog-left {
      animation-delay: 0s;
    }

    .frog-right {
      animation-delay: 0.3s;
    }

    @keyframes frogBounce {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-15px) rotate(-5deg); }
      75% { transform: translateY(-8px) rotate(5deg); }
    }

    @keyframes frogHappy {
      0%, 100% { transform: scale(1.1) rotate(0deg); }
      25% { transform: scale(1.15) rotate(-10deg); }
      50% { transform: scale(1.2) rotate(0deg); }
      75% { transform: scale(1.15) rotate(10deg); }
    }

    .heart-between {
      font-size: 2rem;
      animation: heartBeat 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255, 100, 150, 0.6));
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    /* Barra de progresso estilo nenúfar */
    .progress-lilypad {
      margin: 25px 0;
      position: relative;
    }

    .progress-track {
      height: 30px;
      background: rgba(27, 67, 50, 0.4);
      border-radius: 50px;
      border: 2px solid rgba(82, 183, 136, 0.5);
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #52b788, #74c69d, #95d5b2, #b7e4c7);
      border-radius: 50px;
      box-shadow: 
        0 0 20px rgba(82, 183, 136, 0.6),
        inset 0 1px 2px rgba(255, 255, 255, 0.3);
      transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      width: 0%;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* Estatísticas */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 25px 0;
    }

    .stat-card {
      background: rgba(45, 106, 79, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(82, 183, 136, 0.4);
      border-radius: 20px;
      padding: 15px 10px;
      text-align: center;
      transition: all 0.3s;
      animation: cardFloat 3s ease-in-out infinite;
    }

    .stat-card:nth-child(1) { animation-delay: 0s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.4s; }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    .stat-card:hover {
      background: rgba(64, 145, 108, 0.4);
      border-color: rgba(116, 198, 157, 0.6);
      transform: scale(1.05);
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b7e4c7;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #d8f3dc;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* Formulário */
    .form-section {
      margin: 25px 0;
    }

    .form-title {
      color: #d8f3dc;
      font-size: 1.2rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-label {
      display: block;
      color: #b7e4c7;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .fancy-input, .fancy-select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(27, 67, 50, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(82, 183, 136, 0.4);
      border-radius: 50px;
      color: #d8f3dc;
      font-size: 1rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      outline: none;
      transition: all 0.3s;
    }

    .fancy-input:focus, .fancy-select:focus {
      border-color: #74c69d;
      box-shadow: 0 0 20px rgba(116, 198, 157, 0.4);
      background: rgba(45, 106, 79, 0.5);
    }

    .fancy-input::placeholder {
      color: rgba(184, 227, 199, 0.6);
    }

    .fancy-select option {
      background: #2d6a4f;
      color: #d8f3dc;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #52b788, #40916c);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 
        0 10px 25px -5px rgba(0, 0, 0, 0.3),
        0 0 20px rgba(82, 183, 136, 0.3);
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 15px 30px -5px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(116, 198, 157, 0.5);
      background: linear-gradient(135deg, #74c69d, #52b788);
    }

    .submit-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Lista de depósitos */
    .deposits-list {
      margin-top: 20px;
    }

    .deposit-item {
      background: rgba(45, 106, 79, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(82, 183, 136, 0.3);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.5s ease-out;
      transition: all 0.3s;
    }

    .deposit-item:hover {
      background: rgba(64, 145, 108, 0.4);
      border-color: rgba(116, 198, 157, 0.5);
      transform: translateX(5px);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .deposit-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .deposit-date {
      color: #95d5b2;
      font-size: 0.85rem;
    }

    .deposit-who {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .frog-icon-small {
      font-size: 1.2rem;
    }

    .deposit-name {
      color: #d8f3dc;
      font-weight: 600;
    }

    .deposit-amount {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .amount-value {
      color: #d8f3dc;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .badge {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-sapinho {
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #d8f3dc;
      border: 1px solid #52b788;
    }

    .badge-sapinha {
      background: linear-gradient(135deg, #52b788, #74c69d);
      color: #1b4332;
      border: 1px solid #95d5b2;
    }

    /* Mensagens */
    .message {
      padding: 12px 18px;
      border-radius: 20px;
      margin: 15px 0;
      animation: slideDown 0.4s ease-out;
      font-weight: 500;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-message {
      background: rgba(220, 38, 38, 0.2);
      border: 2px solid rgba(239, 68, 68, 0.5);
      color: #fecaca;
    }

    .success-message {
      background: rgba(82, 183, 136, 0.2);
      border: 2px solid rgba(82, 183, 136, 0.5);
      color: #d8f3dc;
    }

    /* Loading */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(82, 183, 136, 0.3);
      border-radius: 50%;
      border-top-color: #52b788;
      animation: spin 1s ease-in-out infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      color: #74c69d;
      margin-top: 30px;
      font-size: 0.9rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* Responsivo */
    @media (max-width: 480px) {
      .fancy-title {
        font-size: 2.5rem;
      }
      
      .frog {
        font-size: 2.8rem;
      }
      
      .stat-value {
        font-size: 1.1rem;
      }
      
      .lilypad-card {
        padding: 20px 15px;
      }
    }

    /* Efeito de brilho nos sapinhos */
    .frog-glow {
      animation: frogGlow 2s ease-in-out infinite;
    }

    @keyframes frogGlow {
      0%, 100% { filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2)) brightness(1); }
      50% { filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2)) drop-shadow(0 0 20px rgba(116, 198, 157, 0.6)) brightness(1.1); }
    }
  </style>
</head>
<body>
  <!-- Folhas flutuantes -->
  <div class="floating-leaf" style="left: 5%; animation-duration: 18s; font-size: 3rem;">🍃</div>
  <div class="floating-leaf" style="left: 85%; animation-duration: 22s; animation-delay: -5s; font-size: 2.5rem;">🌿</div>
  <div class="floating-leaf" style="left: 45%; animation-duration: 25s; animation-delay: -10s; font-size: 2rem;">🍀</div>

  <div class="container">
    <!-- Card Principal -->
    <div class="lilypad-card">
      <h1 class="fancy-title">
        Nosso AP
        <span style="display: block; font-size: 1.8rem; margin-top: -10px;">🐸💚🐸</span>
      </h1>

      <!-- Sapinhos animados -->
      <div class="frog-couple">
        <div class="frog frog-left frog-glow" onclick="playFrogSound('sapinho')">🐸</div>
        <div class="heart-between">💚</div>
        <div class="frog frog-right frog-glow" onclick="playFrogSound('sapinha')">🐸</div>
      </div>
      <p style="text-align: center; color: #b7e4c7; margin-top: -10px; font-size: 1.1rem;">
        <span style="font-weight: 600; color: #74c69d;">Sapinho</span> 
        <span style="margin: 0 10px;">&</span> 
        <span style="font-weight: 600; color: #95d5b2;">Sapinha</span>
      </p>

      <!-- Mensagens -->
      <div id="errorMsg" class="message error-message" style="display: none;"></div>
      <div id="successMsg" class="message success-message" style="display: none;"></div>

      <!-- Progresso -->
      <div style="text-align: center; margin: 20px 0 10px;">
        <span id="percentDisplay" style="font-size: 2.5rem; font-weight: 700; color: #d8f3dc; text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);">0%</span>
        <span style="color: #95d5b2; margin-left: 5px;">da meta</span>
      </div>

      <!-- Barra de progresso -->
      <div class="progress-lilypad">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Estatísticas -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">🐸 Guardado</div>
          <div class="stat-value" id="totalSaved">R$ 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">💚 Falta</div>
          <div class="stat-value" id="totalRemaining">R$ 10.000</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🌿 Média/dia</div>
          <div class="stat-value" id="dailyNeeded">R$ 0</div>
        </div>
      </div>

      <!-- Contribuições individuais -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;">
        <div style="text-align: center;">
          <div style="font-size: 2rem;">🐸</div>
          <div style="color: #74c69d; font-weight: 600; margin-bottom: 5px;">Sapinho</div>
          <div id="totalSapinho" style="color: #d8f3dc; font-size: 1.3rem; font-weight: 700;">R$ 0</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem;">🐸</div>
          <div style="color: #95d5b2; font-weight: 600; margin-bottom: 5px;">Sapinha</div>
          <div id="totalSapinha" style="color: #d8f3dc; font-size: 1.3rem; font-weight: 700;">R$ 0</div>
        </div>
      </div>

      <!-- Formulário -->
      <div class="form-section">
        <div class="form-title">
          <span>🐸</span>
          <span>Novo Depósito no Nenúfar</span>
          <span>🐸</span>
        </div>

        <form id="depositForm">
          <div class="input-group">
            <label class="input-label">💚 Quanto vai guardar hoje?</label>
            <input type="number" id="valor" class="fancy-input" step="0.01" min="0.01" placeholder="Ex: 500,00" required>
          </div>

          <div class="input-group">
            <label class="input-label">🐸 Quem está depositando?</label>
            <select id="quem" class="fancy-select" required>
              <option value="">Escolha o sapinho...</option>
              <option value="Sapinho">🐸 Sapinho</option>
              <option value="Sapinha">🐸 Sapinha</option>
            </select>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span id="btnText">🌿 Registrar no Nenúfar</span>
          </button>
        </form>
      </div>

      <!-- Lista de depósitos -->
      <div class="deposits-list">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
          <span style="font-size: 1.5rem;">🐸</span>
          <span style="color: #d8f3dc; font-weight: 600;">Últimos Depósitos</span>
          <span style="font-size: 1.5rem;">🐸</span>
        </div>
        <div id="depositsList"></div>
      </div>
    </div>

    <div class="footer">
      <p>💚 Feito com muito amor por Sapinho & Sapinha 💚</p>
      <p style="margin-top: 5px; font-size: 0.8rem;">🐸 Cada depósito é um passo para nosso cantinho 🐸</p>
    </div>
  </div>

  <script>
    // CONFIGURAÇÃO - Coloque sua URL da Web App aqui
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVeNqZsDh7rZkXNbVf5dZtJ6G8YXRMXMBBGKIcVZaXKcZCBNX_veXHhKSbZgQI7oU/exec';
    
    const GOAL = 10000;
    let depositos = [];

    // Sons de sapo (opcional)
    function playFrogSound(type) {
      // Apenas uma animação visual, sem som real
      const frog = event.target;
      frog.style.animation = 'none';
      setTimeout(() => {
        frog.style.animation = 'frogBounce 2s ease-in-out infinite';
      }, 10);
    }

    function formatMoney(value) {
      return 'R$ ' + value.toFixed(2).replace('.', ',');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '🐸❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '🐸💚 ' + msg;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 3000);
    }

    function updateDisplay() {
      const total = depositos.reduce((sum, d) => sum + d.valor, 0);
      const remaining = Math.max(0, GOAL - total);
      const percent = (total / GOAL) * 100;
      
      const hoje = new Date();
      const deadline = new Date('2026-12-31');
      const diasRestantes = Math.max(1, Math.ceil((deadline - hoje) / (1000 * 60 * 60 * 24)));
      const mediaDiaria = remaining / diasRestantes;

      // Atualizar displays
      document.getElementById('percentDisplay').textContent = percent.toFixed(1).replace('.', ',') + '%';
      document.getElementById('progressFill').style.width = Math.min(100, percent) + '%';
      document.getElementById('totalSaved').textContent = formatMoney(total);
      document.getElementById('totalRemaining').textContent = formatMoney(remaining);
      document.getElementById('dailyNeeded').textContent = formatMoney(mediaDiaria);

      // Totais individuais
      const totalSapinho = depositos.filter(d => d.quem === 'Sapinho').reduce((sum, d) => sum + d.valor, 0);
      const totalSapinha = depositos.filter(d => d.quem === 'Sapinha').reduce((sum, d) => sum + d.valor, 0);
      
      document.getElementById('totalSapinho').textContent = formatMoney(totalSapinho);
      document.getElementById('totalSapinha').textContent = formatMoney(totalSapinha);

      // Últimos 3 depósitos
      const ultimos = [...depositos].reverse().slice(0, 3);
      const listEl = document.getElementById('depositsList');
      
      if (ultimos.length === 0) {
        listEl.innerHTML = '<p style="text-align: center; color: #95d5b2; padding: 20px;">🐸 Nenhum depósito ainda... Vamos começar? 💚</p>';
      } else {
        listEl.innerHTML = ultimos.map(d => `
          <div class="deposit-item">
            <div class="deposit-info">
              <div class="deposit-date">📅 ${d.data}</div>
              <div class="deposit-who">
                <span class="frog-icon-small">🐸</span>
                <span class="deposit-name">${d.quem}</span>
              </div>
            </div>
            <div class="deposit-amount">
              <span class="amount-value">${formatMoney(d.valor)}</span>
              <span class="badge ${d.quem === 'Sapinho' ? 'badge-sapinho' : 'badge-sapinha'}">
                ${d.quem === 'Sapinho' ? '🐸 Sapinho' : '🐸 Sapinha'}
              </span>
            </div>
          </div>
        `).join('');
      }
    }

    async function carregarDados() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        if (data.depositos) {
          // Converter "Eu"/"Ela" para "Sapinho"/"Sapinha" se necessário
          depositos = data.depositos.map(d => ({
            ...d,
            quem: d.quem === 'Eu' ? 'Sapinho' : d.quem === 'Ela' ? 'Sapinha' : d.quem
          }));
          updateDisplay();
        }
      } catch (error) {
        console.error('Erro ao carregar:', error);
        showError('Ops! O nenúfar está um pouco agitado. Tente de novo.');
      }
    }

    document.getElementById('depositForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const valor = parseFloat(document.getElementById('valor').value);
      const quem = document.getElementById('quem').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');

      if (!valor || valor <= 0) {
        showError('🐸 Coloca um valor válido, amiguinho!');
        return;
      }
      if (!quem) {
        showError('🐸 Qual sapinho fez esse depósito?');
        return;
      }

      submitBtn.disabled = true;
      btnText.innerHTML = '🐸 Guardando no nenúfar... <span class="loading-spinner"></span>';

      try {
        // Converter para o formato esperado pelo Apps Script
        const quemOriginal = quem === 'Sapinho' ? 'Eu' : 'Ela';
        
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ 
            valor, 
            quem: quemOriginal
          })
        });

        setTimeout(async () => {
          await carregarDados();
          showSuccess(`🐸💚 ${quem} guardou ${formatMoney(valor)}! Que orgulho!`);
          document.getElementById('depositForm').reset();
          submitBtn.disabled = false;
          btnText.innerHTML = '🌿 Registrar no Nenúfar';
          
          // Animação extra de celebração
          celebrateDeposit();
        }, 2000);

      } catch (error) {
        console.error('Erro:', error);
        showError('🐸❌ O nenúfar escapou! Tente de novo.');
        submitBtn.disabled = false;
        btnText.innerHTML = '🌿 Registrar no Nenúfar';
      }
    });

    function celebrateDeposit() {
      const frogs = document.querySelectorAll('.frog');
      frogs.forEach(frog => {
        frog.style.animation = 'frogHappy 0.6s ease-in-out';
        setTimeout(() => {
          frog.style.animation = 'frogBounce 2s ease-in-out infinite';
        }, 600);
      });
    }

    // Adicionar interatividade aos sapinhos
    document.querySelectorAll('.frog').forEach(frog => {
      frog.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.1)';
      });
      
      frog.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
      });
    });

    // Carregar dados iniciais
    carregarDados();

    // Atualizar a cada 30 segundos
    setInterval(carregarDados, 30000);
  </script>
</body>
</html>
